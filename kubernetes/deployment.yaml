apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 851725396275.dkr.ecr.eu-west-2.amazonaws.com/nextwork-flask-backend:latest
          ports:
            - containerPort: 5000